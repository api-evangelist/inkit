aid: inkit
name: Inkit
description: >
  Inkit is a Secure Document Generation (SDG) platform that enables organizations to generate,
  sign, store, and distribute documents in total privacy. The platform provides a REST API for
  rendering HTML templates into PDFs, automating document workflows, and managing digital signatures
  at scale. Inkit supports enterprise-grade security and compliance including HIPAA, SOC 2, FedRAMP,
  and IL4/IL5 certifications, making it suitable for regulated industries such as financial services,
  utilities, and government. The API allows developers to generate documents from templates, invoke
  workflow automation, manage mail piece delivery, and integrate document operations into their own
  applications using SDKs available for Python, Node.js, Go, and Java.
