apis:
  - aid: inkit:inkit-document-generation-api
    name: Inkit Document Generation API
    description: >
      The Inkit REST API enables developers to generate PDF documents from templates, manage
      document storage and retrieval, launch document workflows and batches, send documents
      via mail, and manage digital signature requests. Authentication uses the X-Inkit-API-Token
      header and the API enforces a rate limit of 300 requests per minute.
    humanURL: https://docs.inkit.com/docs/using-the-api
